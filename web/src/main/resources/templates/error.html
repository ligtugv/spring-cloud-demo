<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出错了 - 微服务 DEMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 480px; overflow: hidden; text-align: center; padding: 40px; }
        .error-icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; text-decoration: none; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .details { background: #f5f5f5; border-radius: 8px; padding: 15px; margin: 20px 0; text-align: left; font-size: 13px; color: #555; }
        .details strong { display: block; margin-bottom: 5px; color: #333; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">⚠️</div>
    <h1 th:text="${error != null ? error : '发生错误'}">发生错误</h1>
    <p th:text="${message != null ? message : '抱歉，系统遇到了一些问题，请返回登录页面重试。'}">抱歉，系统遇到了一些问题，请返回登录页面重试。</p>
    <div class="details" th:if="${status != null}">
        <strong>错误信息</strong>
        HTTP <span th:text="${status}">404</span> - <span th:text="${error != null ? error : 'Not Found'}">Not Found</span>
    </div>
    <a href="/login" class="btn">返回登录页</a>
</div>
</body>
</html>
