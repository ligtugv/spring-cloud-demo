server:
  port: 8080
  tomcat:
    max-http-header-size: 32768

spring:
  application:
    name: web
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://microservice-uaa:9000/.well-known/jwks.json
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

app:
  gateway-url: http://microservice-gateway:7573
  uaa-url: http://microservice-uaa:9000

logging:
  level:
    root: INFO
    com.example.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
