spring:
  application:
    name: uaa

  datasource:
    url: jdbc:h2:mem:uaa_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    oauth2:
      authorization-server:
        enabled: true
      client:
        registration:
          github:
            client-id: Ov23lit971NDwRkcC7UJ
            client-secret: 0f5e7039506c6b5854f674931b70a8de673ed80d
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

server:
  port: 9000
  error:
    include-message: always
    include-binding-errors: always

app:
  issuer: http://localhost:9000

logging:
  level:
    root: INFO
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  ldap:
    urls: ldap://openldap:389
    base: dc=luban-cae,dc=com
    manager-dn: cn=admin,dc=luban-cae,dc=com
    manager-password: admin_secret

---
spring:
  config:
    activate:
      on-profile: default
  ldap:
    urls: ldap://localhost:389
    base: dc=luban-cae,dc=com
    manager-dn: cn=admin,dc=luban-cae,dc=com
    manager-password: admin_secret
