server:
  port: 7573
  tomcat:
    max-http-header-size: 32768
  netty:
    connection:
      header-size: 32768

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://uaa:9000
          predicates:
            - Path=/auth/**
        - id: uaa
          uri: http://uaa:9000
          predicates:
            - Path=/uaa/**
        - id: product
          uri: http://microservice-product:8082
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1
        - id: cart
          uri: http://microservice-cart:8083
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=1
        - id: web
          uri: http://microservice-web:8080
          predicates:
            - Path=/web/**
          filters:
            - StripPrefix=1
        - id: discovery
          uri: http://microservice-discovery:8761
          predicates:
            - Path=/eureka/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    reactor.netty: DEBUG
