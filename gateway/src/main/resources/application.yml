server:
  port: 7573

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://uaa:9000
          predicates:
            - Path=/auth/**
        - id: uaa
          uri: http://uaa:9000
          predicates:
            - Path=/uaa/**
        - id: product
          uri: http://product:8082
          predicates:
            - Path=/product/**
        - id: cart
          uri: http://cart:8083
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=1
        - id: web
          uri: http://web:8080
          predicates:
            - Path=/web/**
          filters:
            - StripPrefix=1
        - id: discovery
          uri: http://discovery:8761
          predicates:
            - Path=/eureka/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8080"
              - "http://localhost:7573"
              - "http://web:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  instance:
    hostname: discovery
    port: 8761
  client:
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${eureka.instance.port}/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
